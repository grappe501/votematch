# Signature Match — Next.js on Netlify (App Router, server routes, @netlify/plugin-nextjs).
# This is not a static site: do not set the publish directory to public/ in the UI or here.
# Build output for the Next adapter is .next (see publish below).
#
# Secrets only in Netlify → Site configuration → Environment variables (never in this file):
# DATABASE_URL, VFM_*, VFM_UPLOAD_TOKEN, OPENAI_* as needed.

[build]
  command = "npm ci && npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
